<html lang="en">

    <title>Arslan Rejepov | Portfolio</title>

    <style>
        :root {
            --bg: #050505; /* Deep black for cinematic feel */
            --accent: #00f2ff; /* Vibrant cyan for data flow and UI elements */
            --text: #ffffff;
            --secondary-text: #b0b0b0;
            --card-bg: rgba(20, 20, 20, 0.8); /* Translucent cards */
            --font-main: 'Inter', sans-serif;
            --font-tech: 'Orbitron', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            margin: 0;
            line-height: 1.6;
            overflow-x: hidden; /* Prevents horizontal scrolling from animation */
        }

        /* Full-screen Deep NN Animation Background */
        #neuralCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Placed behind all content */
            opacity: 0.4; /* Subtle but present */
        }

        .main-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 20px;
            position: relative; /* Context for z-index */
            z-index: 1; /* Content above the animation */
        }

        /* Futuristic Header Styling */
        header {
            text-align: center;
            margin-bottom: 80px;
        }

            font-family: var(--font-tech);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
